# Glare-only sweep (parallel worker 2, port 10094)
env:
  task_name: "google_robot_pick_coke_can"
  policy_model: "internvla-m1"
  max_episode_steps: 100
  internvla_m1_port: 10094
  internvla_m1_ckpt: "/root/internvla_m1_ckpt/checkpoints/steps_50000_pytorch_model.pt"

envelope:
  occlusion_types:
    - glare
  budget_levels:
    - 0.0
    - 0.10
    - 0.30
    - 0.50
    - 0.70
    - 0.90
  episodes_per_eval: 3
  episodes_final_eval: 10
  population_size: 8
  max_generations: 5
  sigma0: 0.3
  seed: 42
  n_random_baselines: 3
  safe_threshold: 0.95
  marginal_threshold: 0.70

glare:
  max_intensity: 1.0
  num_streaks: 8
  chromatic_aberration: 2.0
  ghost_count: 6
  ghost_spacing: 0.3
  ghost_decay: 0.9
  dirty_threshold: 0.05

output_dir: "results/coke_can_glare"
