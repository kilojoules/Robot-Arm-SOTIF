# Extreme occlusion v2: physics-based greasy fingerprints + glare
#
# Fingerprint model rewritten: defocus blur + opaque grease + scatter.
# Severity controlled by budget (coverage) — more smudges visible at
# higher budgets.  Small fingertip-sized prints (scale 0.05-0.15).

env:
  task_name: "widowx_put_eggplant_in_basket"
  policy_model: "internvla-m1"
  max_episode_steps: 100
  internvla_m1_port: 10093
  internvla_m1_ckpt: "/root/internvla_m1_ckpt/checkpoints/steps_50000_pytorch_model.pt"

envelope:
  occlusion_types:
    - fingerprint
    - glare
  budget_levels:
    - 0.10
    - 0.30
    - 0.50
    - 0.70
    - 0.90
  episodes_per_eval: 3
  episodes_final_eval: 10
  population_size: 8
  max_generations: 5
  sigma0: 0.3
  seed: 42
  n_random_baselines: 3
  safe_threshold: 0.95
  marginal_threshold: 0.70

fingerprint:
  num_prints: 15
  max_opacity: 1.0
  smudge_color: [80, 65, 40]
  dirty_threshold: 0.15
  scale_range: [0.05, 0.15]
  freq_range: [3.0, 15.0]

glare:
  max_intensity: 1.0
  num_streaks: 8
  chromatic_aberration: 2.0
  ghost_count: 6
  ghost_spacing: 0.3
  ghost_decay: 0.9
  dirty_threshold: 0.05

output_dir: "results/envelope_eggplant_internvla_extreme_v2"
