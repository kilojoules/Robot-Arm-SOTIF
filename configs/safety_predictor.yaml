# Safety predictor pipeline config
# Collects fingerprint+glare training data (random + adversarial params),
# trains CNN, evaluates on held-out rain + fingerprint holdout.
env:
  task_name: "google_robot_pick_coke_can"
  policy_model: "internvla-m1"
  max_episode_steps: 100
  internvla_m1_port: 10093
  internvla_m1_ckpt: "/root/internvla_m1_ckpt/checkpoints/steps_50000_pytorch_model.pt"

# Envelope settings (used by make_occlusion_model for data collection)
envelope:
  occlusion_types:
    - fingerprint
    - glare
  budget_levels:
    - 0.10
    - 0.30
    - 0.50
    - 0.70
    - 0.90
  episodes_per_eval: 3
  episodes_final_eval: 10
  population_size: 8
  max_generations: 5
  sigma0: 0.3
  seed: 42
  n_random_baselines: 3
  safe_threshold: 0.95
  marginal_threshold: 0.70

fingerprint:
  num_prints: 15
  max_opacity: 1.0
  smudge_color: [80, 65, 40]
  dirty_threshold: 0.15
  scale_range: [0.05, 0.15]
  freq_range: [3.0, 15.0]

output_dir: "results/safety_predictor"
