generator:
  latent_dim: 16
  encoder_channels: [8, 16, 32]
  decoder_channels: [32, 16, 8]
  intermediate_resolution: [12, 12]
  max_opacity: 0.6
  num_blobs: 4
  learning_rate: 0.001
  explore_sigma: 0.05
  dust_color: [180, 160, 140]
  dirty_threshold: 0.05

defender:
  freeze_pattern: "head_only"
  learning_rate: 0.0003
  grpo_episodes_per_round: 10
  grpo_update_steps: 20
  grpo_batch_size: 4

training:
  n_rounds: 5
  attacker_steps_per_round: 15
  episodes_per_reinforce_sample: 2
  n_samples_per_step: 3
  budget_levels: [0.10, 0.30]
  eval_episodes: 10
  seed: 42

env:
  task_name: "widowx_put_eggplant_in_basket"
  policy_model: "octo-small"
  max_episode_steps: 200

output_dir: "results/adversarial_medium"
