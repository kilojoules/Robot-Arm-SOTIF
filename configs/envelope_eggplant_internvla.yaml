# Safe Operating Envelope: Put Eggplant in Basket with InternVLA-M1
#
# Run with:
#   python -m adversarial_dust.run_envelope --config configs/envelope_eggplant_internvla.yaml
#
# Tests fingerprint smudges and glare effects against InternVLA-M1 (100% clean SR)
# to find the certified safe operating region.

env:
  task_name: "widowx_put_eggplant_in_basket"
  policy_model: "internvla-m1"
  max_episode_steps: 200
  internvla_m1_port: 10093
  internvla_m1_ckpt: "/root/internvla_m1_ckpt/checkpoints/steps_50000_pytorch_model.pt"

envelope:
  occlusion_types:
    - fingerprint
    - glare
  budget_levels:
    - 0.01
    - 0.02
    - 0.05
    - 0.10
    - 0.15
    - 0.20
    - 0.30
    - 0.40
  episodes_per_eval: 5
  episodes_final_eval: 25
  population_size: 20
  max_generations: 50
  sigma0: 0.2
  seed: 42
  n_random_baselines: 5
  safe_threshold: 0.95
  marginal_threshold: 0.70

fingerprint:
  num_prints: 3
  max_opacity: 0.5
  smudge_color: [200, 190, 170]
  dirty_threshold: 0.05
  scale_range: [0.05, 0.25]
  freq_range: [3.0, 15.0]

glare:
  max_intensity: 0.8
  num_streaks: 6
  chromatic_aberration: 1.5
  ghost_count: 4
  ghost_spacing: 0.4
  ghost_decay: 0.85
  dirty_threshold: 0.05

output_dir: "results/envelope_eggplant_internvla"
