env:
  task_name: "google_robot_pick_coke_can"
  policy_model: "octo-base"
  max_episode_steps: 80
  control_freq: 3
  sim_freq: 513

demo_collection:
  max_attempts: 500
  target_demos: 30

finetuning:
  freeze_transformer: false
  learning_rate: 0.000003
  n_steps: 1000
  batch_size: 32

evaluation:
  severity_levels: ["clean"]
  episodes_per_eval: 20

output_dir: "results/dust_robustness_coke_can"
