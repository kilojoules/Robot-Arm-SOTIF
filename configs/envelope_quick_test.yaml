# Quick test config for envelope predictor (fast local validation)
#
# Run with:
#   python -m adversarial_dust.run_envelope --config configs/envelope_quick_test.yaml

env:
  task_name: "widowx_put_eggplant_in_basket"
  policy_model: "octo-small"
  max_episode_steps: 50

envelope:
  occlusion_types:
    - fingerprint
    - glare
  budget_levels:
    - 0.05
    - 0.10
    - 0.20
  episodes_per_eval: 2
  episodes_final_eval: 3
  population_size: 5
  max_generations: 3
  sigma0: 0.3
  seed: 42
  n_random_baselines: 2
  safe_threshold: 0.95
  marginal_threshold: 0.70

fingerprint:
  num_prints: 2
  max_opacity: 0.5

glare:
  max_intensity: 0.8

output_dir: "results/envelope_quick_test"
