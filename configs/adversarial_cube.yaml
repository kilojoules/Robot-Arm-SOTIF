generator:
  latent_dim: 32
  encoder_channels: [16, 32, 64]
  decoder_channels: [64, 32, 16]
  intermediate_resolution: [16, 16]
  max_opacity: 0.6
  num_blobs: 5
  learning_rate: 0.001
  explore_sigma: 0.05
  dust_color: [180, 160, 140]
  dirty_threshold: 0.05

defender:
  freeze_pattern: "head_only"
  learning_rate: 0.0003
  grpo_episodes_per_round: 20
  grpo_update_steps: 50
  grpo_batch_size: 8

training:
  n_rounds: 10
  attacker_steps_per_round: 50
  episodes_per_reinforce_sample: 3
  n_samples_per_step: 4
  budget_levels: [0.10, 0.20, 0.40]
  eval_episodes: 20
  seed: 42

env:
  task_name: "widowx_put_eggplant_in_basket"
  policy_model: "octo-small"
  max_episode_steps: 200

output_dir: "results/adversarial_eggplant"
